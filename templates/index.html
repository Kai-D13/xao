<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>1PL_XÀO - Route Mapping</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a; color: #f1f5f9;
      height: 100vh; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Header ── */
    header {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      border-bottom: 1px solid #334155;
      padding: 10px 18px;
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; z-index: 1000;
    }
    .header-left h1 { font-size: 17px; font-weight: 700; color: #f8fafc; }
    .header-left p  { font-size: 12px; color: #94a3b8; margin-top: 2px; }
    .header-right   { display: flex; align-items: center; gap: 12px; }

    .legend {
      display: flex; gap: 14px;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 7px 13px; font-size: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; }
    .dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .dot-blue { background: #2563EB; }
    .dot-red  { background: #DC2626; }
    .dot-hub  { background: #F59E0B; border: 2px solid #fff; }

    #stats-bar {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 8px; padding: 7px 13px;
      font-size: 12px; color: #94a3b8;
      display: flex; gap: 6px; align-items: center;
    }
    #stats-bar b { color: #f8fafc; }

    /* ── Map ── */
    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Loading ── */
    #loading {
      position: absolute; inset: 0;
      background: rgba(15,23,42,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 2000; transition: opacity 0.4s;
    }
    #loading.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 46px; height: 46px;
      border: 4px solid #334155; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.75s linear infinite;
      margin-bottom: 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text     { font-size: 14px; color: #94a3b8; }
    #loading-progress { font-size: 22px; font-weight: 700; color: #3b82f6; margin-top: 6px; }

    /* ── Sidebar ── */
    #sidebar {
      position: absolute; top: 12px; left: 12px;
      width: 268px;
      background: rgba(15,23,42,0.93);
      border: 1px solid #334155; border-radius: 10px;
      padding: 14px; z-index: 1000;
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    #sidebar h3 {
      font-size: 11px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 1px; margin-bottom: 9px;
    }
    .carrier-list { display: flex; flex-direction: column; gap: 4px; }
    .carrier-item {
      display: flex; align-items: center; gap: 7px;
      padding: 4px 6px; border-radius: 5px; cursor: pointer;
      transition: background 0.12s;
    }
    .carrier-item:hover { background: #1e293b; }
    .carrier-item input { cursor: pointer; accent-color: #3b82f6; }
    .carrier-item label {
      font-size: 12px; color: #e2e8f0; cursor: pointer;
      flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .carrier-count { font-size: 11px; color: #475569; flex-shrink: 0; }

    .divider { border: none; border-top: 1px solid #334155; margin: 10px 0; }

    .hub-card {
      background: rgba(245,158,11,0.08); border: 1px solid rgba(245,158,11,0.25);
      border-radius: 7px; padding: 8px 10px;
      cursor: pointer; transition: background 0.15s;
    }
    .hub-card:hover { background: rgba(245,158,11,0.15); }
    .hub-card-name  { font-size: 12px; font-weight: 600; color: #F59E0B; }
    .hub-card-coord { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* ── Leaflet popup override ── */
    .leaflet-popup-content-wrapper {
      background: #1e293b !important;
      border: 1px solid #334155 !important;
      border-radius: 10px !important;
      color: #f1f5f9 !important;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5) !important;
    }
    .leaflet-popup-tip         { background: #1e293b !important; }
    .leaflet-popup-close-button { color: #64748b !important; font-size: 16px !important; }
    .leaflet-popup-content     { margin: 12px 14px !important; }

    /* ── Popup content ── */
    .p-title   { font-size: 14px; font-weight: 700; color: #f8fafc; margin-bottom: 4px; }
    .p-carrier { font-size: 11px; color: #94a3b8; margin-bottom: 10px; }
    .p-stats   { display: flex; gap: 20px; margin-bottom: 10px; }
    .p-stat    { display: flex; flex-direction: column; align-items: center; }
    .p-num-blue  { font-size: 28px; font-weight: 800; color: #3b82f6; line-height: 1; }
    .p-num-green { font-size: 28px; font-weight: 800; color: #10b981; line-height: 1; }
    .p-unit    { font-size: 10px; color: #64748b; margin-top: 3px; text-align: center; }
    .p-addr    { font-size: 11px; color: #94a3b8; border-top: 1px solid #334155; padding-top: 7px; }
    .badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 7px; border-radius: 20px;
    }
    .badge-blue { background: rgba(37,99,235,0.2); color: #60a5fa; }
    .badge-red  { background: rgba(220,38,38,0.2);  color: #f87171; }

    /* Leaflet cluster override */
    .marker-cluster-small, .marker-cluster-medium, .marker-cluster-large {
      background: rgba(30,41,59,0.85) !important;
    }
    .marker-cluster-small div, .marker-cluster-medium div, .marker-cluster-large div {
      background: rgba(59,130,246,0.7) !important;
      color: #f8fafc !important;
      font-weight: 700 !important;
      font-size: 13px !important;
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>1PL_XÀO</h1>
    <p>Trực quan hóa &amp; tối ưu tuyến đường vận chuyển</p>
  </div>
  <div class="header-right">
    <div class="legend">
      <div class="legend-item"><div class="dot dot-blue"></div>NVCT Hub Di Linh</div>
      <div class="legend-item"><div class="dot dot-red"></div>3PL</div>
      <div class="legend-item"><div class="dot dot-hub"></div>Hub location</div>
    </div>
    <div id="stats-bar">
      Tổng: <b id="s-total">–</b> &nbsp;|&nbsp;
      NVCT: <b id="s-hub">–</b> &nbsp;|&nbsp;
      3PL: <b id="s-other">–</b>
    </div>
  </div>
</header>

<div id="map-wrap">
  <div id="loading">
    <div class="spinner"></div>
    <div id="loading-text">Đang geocode địa chỉ &amp; tải dữ liệu...</div>
    <div id="loading-progress"></div>
  </div>

  <div id="map"></div>

  <div id="sidebar">
    <h3>Bộ lọc</h3>
    <span style="font-size:11px;color:#94a3b8;display:block;margin-bottom:7px;">Nhà vận chuyển</span>
    <div class="carrier-list" id="carrier-list"></div>
    <hr class="divider" />
    <h3>Hub Locations</h3>
    <div id="hub-list"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
const TILEMAP_KEY = "{{ tilemap_key }}";

// ── Map init ──────────────────────────────────────────────
const map = L.map('map', { center: [11.55, 107.93], zoom: 10 });

// VietMap raster tiles (Leaflet integration per VietMap docs)
const vietmapTiles = L.tileLayer(
  `https://maps.vietmap.vn/api/maps/light/{z}/{x}/{y}.png?apikey=${TILEMAP_KEY}`,
  { attribution: '© <a href="https://vietmap.vn">VietMap</a>', maxZoom: 19, tileSize: 256 }
);

const osmTiles = L.tileLayer(
  'https://tile.openstreetmap.org/{z}/{x}/{y}.png',
  { attribution: '© <a href="https://openstreetmap.org">OpenStreetMap</a>', maxZoom: 19 }
);

// Try VietMap, fall back to OSM on first tile error
let vmFailed = false;
vietmapTiles.on('tileerror', () => {
  if (!vmFailed) {
    vmFailed = true;
    map.removeLayer(vietmapTiles);
    osmTiles.addTo(map);
    console.warn('VietMap tiles unavailable → switched to OpenStreetMap');
  }
});
vietmapTiles.addTo(map);

// ── State ─────────────────────────────────────────────────
let allPoints = [];
let checkedCarriers = new Set();
let clusterLayer = null;

// ── Icon helpers ──────────────────────────────────────────
function dotIcon(color, r) {
  const s = r * 2;
  return L.divIcon({
    className: '',
    html: `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${color};
                border:2px solid rgba(255,255,255,0.9);
                box-shadow:0 2px 6px rgba(0,0,0,0.45);"></div>`,
    iconSize: [s, s], iconAnchor: [r, r],
  });
}

function hubDotIcon() {
  return L.divIcon({
    className: '',
    html: `<div style="width:24px;height:24px;border-radius:50%;background:#F59E0B;
                border:3px solid #fff;
                box-shadow:0 0 0 5px rgba(245,158,11,0.22),0 3px 8px rgba(0,0,0,0.4);"></div>`,
    iconSize: [24, 24], iconAnchor: [12, 12],
  });
}

// ── Popup builder ─────────────────────────────────────────
function makePopupHTML(pt) {
  const badge = pt.is_hub_carrier
    ? '<span class="badge badge-blue">NVCT Hub Di Linh</span>'
    : '<span class="badge badge-red">3PL</span>';

  return `
    <div style="min-width:215px;">
      <div class="p-title">${pt.ward_name}</div>
      <div class="p-carrier">${pt.carrier_name}&nbsp;${badge}</div>
      <div class="p-stats">
        <div class="p-stat">
          <span class="p-num-blue">${pt.avg_order}</span>
          <span class="p-unit">đơn TB / tháng</span>
        </div>
        <div class="p-stat">
          <span class="p-num-green">${pt.distance_km}</span>
          <span class="p-unit">km từ Hub</span>
        </div>
      </div>
      <div class="p-addr">${pt.full_address}</div>
    </div>`;
}

// ── Marker factory ────────────────────────────────────────
function makeMarker(pt) {
  const r = Math.max(6, Math.min(16, 5 + pt.avg_order / 5));
  return L.marker([pt.lat, pt.lng], { icon: dotIcon(pt.color, r) })
          .bindPopup(makePopupHTML(pt), { maxWidth: 290 });
}

// ── Cluster layer ─────────────────────────────────────────
function rebuildCluster(points) {
  if (clusterLayer) map.removeLayer(clusterLayer);

  clusterLayer = L.markerClusterGroup({
    maxClusterRadius: 40,
    iconCreateFunction(cluster) {
      const n = cluster.getChildCount();
      return L.divIcon({
        className: '',
        html: `<div style="background:rgba(30,41,59,0.92);border:2px solid #3b82f6;
                    border-radius:50%;width:36px;height:36px;
                    display:flex;align-items:center;justify-content:center;
                    color:#f1f5f9;font-size:12px;font-weight:700;">${n}</div>`,
        iconSize: [36, 36], iconAnchor: [18, 18],
      });
    },
  });

  points.forEach(pt => clusterLayer.addLayer(makeMarker(pt)));
  clusterLayer.addTo(map);
}

// ── Filter & stats ────────────────────────────────────────
function applyFilter() {
  const visible = allPoints.filter(p => checkedCarriers.has(p.carrier_name));
  rebuildCluster(visible);
  document.getElementById('s-total').textContent  = visible.length;
  document.getElementById('s-hub').textContent    = visible.filter(p => p.is_hub_carrier).length;
  document.getElementById('s-other').textContent  = visible.filter(p => !p.is_hub_carrier).length;
}

// ── Sidebar ───────────────────────────────────────────────
function buildCarrierList(points) {
  const counts = {};
  points.forEach(p => { counts[p.carrier_name] = (counts[p.carrier_name] || 0) + 1; });
  const list = document.getElementById('carrier-list');
  list.innerHTML = '';
  Object.keys(counts).sort().forEach(carrier => {
    checkedCarriers.add(carrier);
    const id = 'cb_' + Math.random().toString(36).slice(2);
    const div = document.createElement('div');
    div.className = 'carrier-item';
    div.innerHTML = `<input type="checkbox" id="${id}" checked />
      <label for="${id}">${carrier}</label>
      <span class="carrier-count">${counts[carrier]}</span>`;
    div.querySelector('input').addEventListener('change', e => {
      e.target.checked ? checkedCarriers.add(carrier) : checkedCarriers.delete(carrier);
      applyFilter();
    });
    list.appendChild(div);
  });
}

function buildHubList(hubs) {
  const c = document.getElementById('hub-list');
  c.innerHTML = '';
  hubs.forEach(hub => {
    const div = document.createElement('div');
    div.className = 'hub-card';
    div.innerHTML = `<div class="hub-card-name">${hub.name}</div>
      <div class="hub-card-coord">${hub.lat.toFixed(5)}, ${hub.lng.toFixed(5)}</div>`;
    div.addEventListener('click', () => map.setView([hub.lat, hub.lng], 13));
    c.appendChild(div);
  });
}

// ── Load data ─────────────────────────────────────────────
async function loadPoints() {
  const pollId = setInterval(async () => {
    try {
      const s = await fetch('/api/geocode-status').then(r => r.json());
      document.getElementById('loading-progress').textContent =
        `${s.geocoded} / ${s.total} địa chỉ đã geocode`;
    } catch {}
  }, 1500);

  try {
    const data = await fetch('/api/points').then(r => r.json());
    clearInterval(pollId);
    allPoints = data.points;

    buildCarrierList(allPoints);
    buildHubList(data.hubs);

    // Hub markers (always visible, above clusters)
    data.hubs.forEach(hub => {
      L.marker([hub.lat, hub.lng], { icon: hubDotIcon(), zIndexOffset: 1000 })
        .bindPopup(`<div>
          <div class="p-title" style="color:#F59E0B;">🏭 ${hub.name}</div>
          <div class="p-carrier" style="margin-top:6px;">${hub.lat.toFixed(5)}, ${hub.lng.toFixed(5)}</div>
        </div>`)
        .addTo(map);
    });

    applyFilter();

    if (allPoints.length > 0) {
      map.fitBounds(
        L.latLngBounds(allPoints.map(p => [p.lat, p.lng])),
        { padding: [40, 40] }
      );
    }

    document.getElementById('loading').classList.add('hidden');

  } catch (err) {
    clearInterval(pollId);
    document.getElementById('loading-text').textContent = 'Lỗi: ' + err.message;
    console.error(err);
  }
}

loadPoints();
</script>
</body>
</html>
